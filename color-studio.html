<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RioPoly 3D Studio — Walk clients through a 3D furnished space and visualize every surface in real time.">
    <title>3D Studio — RioPoly</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #141b2d 50%, #0f1420 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #e5e7eb;
            overflow: hidden;
        }

        /* Background orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            pointer-events: none;
            animation: float 8s ease-in-out infinite alternate;
        }
        .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(59,130,246,0.8), transparent 70%); top: -100px; left: -100px; }
        .orb-2 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(139,92,246,0.8), transparent 70%); bottom: -150px; right: -150px; animation-delay: -4s; }
        @keyframes float {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(30px, 20px) scale(1.1); }
        }

        /* Nav */
        .nav {
            position: fixed; top: 0; left: 0; right: 0;
            height: 60px;
            background: rgba(10,14,39,0.85);
            border-bottom: 1px solid rgba(59,130,246,0.15);
            backdrop-filter: blur(16px);
            display: flex; align-items: center; padding: 0 24px;
            gap: 12px; z-index: 10;
        }
        .nav a { color: #6b7280; text-decoration: none; font-size: 12px; display: flex; align-items: center; gap: 5px; transition: color 0.2s; }
        .nav a:hover { color: #fff; }
        .brand { display: flex; align-items: center; gap: 8px; text-decoration: none !important; }
        .brand-icon { width: 28px; height: 28px; border-radius: 7px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 13px; }
        .brand-name { font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 700; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sep { color: #1e2a4a; font-size: 20px; }

        /* Loading card */
        .card {
            position: relative; z-index: 5;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 48px 40px;
            text-align: center;
            max-width: 460px;
            width: calc(100% - 48px);
            backdrop-filter: blur(12px);
        }
        .icon-wrap {
            width: 72px; height: 72px; border-radius: 18px;
            background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(139,92,246,0.2));
            border: 1px solid rgba(139,92,246,0.35);
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; margin: 0 auto 24px; animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(139,92,246,0.3); }
            50%       { box-shadow: 0 0 0 12px rgba(139,92,246,0); }
        }
        h1 {
            font-family: 'Poppins', sans-serif; font-size: 26px; font-weight: 800; color: #fff; margin-bottom: 10px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        p { color: #6b7280; font-size: 14px; line-height: 1.65; margin-bottom: 28px; }

        /* Progress bar */
        .progress-wrap { background: rgba(255,255,255,0.06); border-radius: 9999px; height: 4px; overflow: hidden; margin-bottom: 12px; }
        .progress-bar {
            height: 100%; border-radius: 9999px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
            background-size: 200% 100%;
            animation: progress 2.4s ease-in-out forwards, shimmer 1.5s linear infinite;
        }
        @keyframes progress { from { width: 0; } to { width: 100%; } }
        @keyframes shimmer { from { background-position: 0 0; } to { background-position: -200% 0; } }
        .progress-label { font-size: 11px; color: #4b5563; letter-spacing: 0.5px; }

        /* Fallback link */
        .fallback { margin-top: 24px; font-size: 12px; color: #374151; }
        .fallback a { color: #60a5fa; text-decoration: none; }
        .fallback a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Nav -->
    <nav class="nav">
        <a href="/" class="brand">
            <img src="assets/riopoly-mark.svg" alt="RioPoly" class="brand-icon" style="width:32px;height:32px;border-radius:7px;" />
            <span class="brand-name">RioPoly</span>
        </a>
        <span class="sep">|</span>
        <span style="font-size:12px; color:#6b7280;">3D Studio</span>
        <div style="flex:1"></div>
        <a href="/">← Back to Site</a>
    </nav>

    <!-- Loading card -->
    <div class="card">
        <div class="icon-wrap">🧊</div>
        <h1>RioPoly 3D Studio</h1>
        <p>Loading your interactive 3D visualization experience. Walk through furnished rooms and paint every surface in real time, then generate branded proposals in minutes.</p>

        <div class="progress-wrap">
            <div class="progress-bar"></div>
        </div>
        <div class="progress-label">Preparing your experience…</div>

        <div class="fallback">
            Not loading? <a id="direct-link" href="/color-studio/index.html">Click here to launch directly</a>
        </div>
    </div>

    <script>
        // Redirect to the React app after the loading animation
        // The React app is built into /color-studio/ by Vite
        setTimeout(function () {
            // Vercel rewrites /color-studio/* → /color-studio/index.html (see vercel.json)
            window.location.href = '/color-studio/';
        }, 2400);
    </script>
</body>
</html>
