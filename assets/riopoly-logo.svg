<svg width="264" height="64" viewBox="0 0 264 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RioPoly">
  <defs>
    <linearGradient id="rpTop" x1="11" y1="8" x2="53" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="rpLeft" x1="11" y1="20" x2="32" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="rpRight" x1="32" y1="32" x2="53" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="rpWord" x1="70" y1="0" x2="250" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="rpGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- soft glow -->
  <ellipse cx="32" cy="34" rx="30" ry="28" fill="url(#rpGlow)"/>

  <!-- faceted isometric cube mark -->
  <polygon points="32,8 53,20 32,32 11,20" fill="url(#rpTop)"/>
  <polygon points="32,8 53,20 32,32" fill="#c7d2fe" opacity="0.45"/>
  <polygon points="11,20 32,32 32,56 11,44" fill="url(#rpLeft)"/>
  <polygon points="53,20 53,44 32,56 32,32" fill="url(#rpRight)"/>
  <!-- crisp inner edges -->
  <path d="M32,8 L32,32 M11,20 L32,32 L53,20" stroke="#0a0e27" stroke-opacity="0.18" stroke-width="0.8" stroke-linejoin="round"/>
  <path d="M32,32 L32,56" stroke="#ffffff" stroke-opacity="0.12" stroke-width="0.8"/>

  <!-- wordmark -->
  <text x="70" y="42" font-family="Poppins, 'Segoe UI', system-ui, sans-serif" font-size="27" font-weight="800" letter-spacing="-0.6">
    <tspan fill="#ffffff">Rio</tspan><tspan fill="url(#rpWord)">Poly</tspan>
  </text>
</svg>
